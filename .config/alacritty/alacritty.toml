# Alacritty Configuration File (TOML format)
# Located at ~/.config/alacritty/alacritty.toml

[general]
# Live config reload (changes require restart)
live_config_reload = true

# The default shell to use
# macOS default is usually /bin/zsh or /bin/bash
# You can uncomment and change this if you want a different shell:
# [shell]
# program = "/bin/bash"
# args = ["--login"]


# Window configuration
[window]
# Dimensions in columns and lines (0 uses max space)
# dimensions = { columns = 0, lines = 0 }
# Blank space added around the window in pixels
padding = { x = 10, y = 10}
blur = true
# Spread additional padding evenly around the terminal content
dynamic_padding = true
# Window decorations (Full, None, Transparent, Buttonless)
decorations = "Buttonless"
# Opacity (0.0 to 1.0)
opacity = 1.00
# opacity = 0.80
# Allow terminal applications to change Alacritty's window title.
dynamic_title = true
# macOS only: Make Option key behave as Alt
option_as_alt = "Both"

# Scrolling settings
[scrolling]
# Maximum number of lines in the scrollback buffer. Default: 10000.
history = 10000
# Number of line scrolled for every input scroll increment. Default: 3.
multiplier = 3

# Font configuration
[font]
# Font size in points.
size = 11.25
offset = {x = 0, y = 1}

[font.normal]
# macOS default font family is usually Menlo.
# family = "Monocraft" 
# family = "Menlo" 
family = "Hasklug Nerd Font" 
style = "Medium"

[font.bold]
# If family is not specified, it falls back to the normal font family.
style = "Bold"

[font.italic]
style = "Italic"

[font.bold_italic]
style = "Bold Italic"

# Colors (Default Monokai-like dark theme)
[colors.primary]
foreground = "#d8d8d8"
# background = "#121212" # obsidian black
background = "#232136" # rose-pine 
# background = "#100c08" # black
# background = "#1e1e2e" # catpuccin

[colors.cursor]
# Cursor color will match foreground if this is not set.
text = "CellBackground"
cursor = "CellForeground"

# Normal colors (0-7)
[colors.normal]
black = "#181818"
red = "#ac4242"
green = "#90a959"
yellow = "#f4bf75"
blue = "#6a9fb5"
magenta = "#aa759f"
cyan = "#75b5aa"
white = "#d8d8d8"

# Bright colors (8-15)
[colors.bright]
black = "#6b6b6b"
red = "#c55555"
green = "#aac474"
yellow = "#feca88"
blue = "#82b8c8"
magenta = "#c28cb8"
cyan = "#93d3c3"
white = "#f8f8f8"

# Cursor settings
[cursor.style]
# Cursor shape (Block, Underline, Beam)
shape = "Block"
# Cursor blinking (Off, On, Always, Never)
blinking = "Off"
