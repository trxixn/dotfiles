unbind C-b
set-option -g prefix M-e
bind M-e send-prefix

unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded ~/.tmux.conf"

# start windows and panes at 1, not 0
set -g base-index 1
setw -g pane-base-index 1

# make tmux background be set to default 
set -g pane-border-style bg=default
set -g pane-active-border-style bg=default
set -g status-style bg=default
set -g message-style bg=default
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ',xterm-256color:Tc'

# move tabs mid up
set-option -g status-justify centre
set-option -g status-position top

# remove host name ion condone ts 
set-option -g status-right "%H:%M"
set-option -g status-left "#S"
set-option -g status-left-length 30

# vim motions for pane movement
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# allows for mouse support
set -g mouse on

# prefix + space to jump back to prev window
bind Space last-window

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
 | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?|fzf)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
 "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
 "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

############# DISPLAY POPUPS ############# 
# New Session (Zsh version)
# Uses 'read "var?Prompt"' syntax specific to Zsh
bind C-n display-popup -E 'zsh -c "read \"name?Session name: \"; tmux new-session -d -s \$name && tmux switch-client -t \$name"'

# Sessionizer (Zsh version)
# 1. Uses 'tmux list-sessions -F' to get clean names (no sed needed)
# 2. Uses 'zsh -c' to run the pipeline
bind C-j display-popup -E 'zsh -c "target=\$(tmux list-sessions -F \"#{session_name}\" | grep -v \"^$(tmux display-message -p \"#S\")\$\" | fzf --reverse); if [ -n \"\$target\" ]; then tmux switch-client -t \"\$target\"; fi"'
# Resize panes with Alt + arrow keys
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 2
bind -n M-Down  resize-pane -D 2

# --- PLUGINS ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Enable automatic restore
set -g @continuum-restore 'on'

# Initialize TMUX plugin manager (keep this at bottom)
run '~/.tmux/plugins/tpm/tpm'
